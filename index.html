<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Guide</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
</head>

<body>

<div class="bg"></div>

<main class="app">
  <section class="card">

    <!-- HERO -->
    <div class="hero">
      <div class="hero-img"></div>

      <div class="hero-card">
        <h1>Start Your Career</h1>
        <p>Ikuti langkah berikut untuk melamar kerja</p>
      </div>
    </div>

    <!-- STEP -->
    <a href="#" class="btn primary">
      🚀 Step 1: Register Account
    </a>

    <a href="#" class="btn">
      📄 Step 2: Apply Job
    </a>

    <!-- MENU -->
    <div class="separator"></div>

    <div class="grid">
      <a href="faq.html" class="btn">❓ FAQ</a>
      <button onclick="openChatbot()" class="btn">💬 Chatbot</button>
      <a href="#" class="btn">🧭 Alur</a>
      <a href="#" class="btn">💬 Testimoni</a>
    </div>

  </section>
</main>

<!-- CHATBOT -->
<div id="chatbot" class="chatbot">
  <div class="chatbox">
    <div id="chat-window"></div>

    <div class="chat-input">
      <input id="chat-input" placeholder="Tanya di sini...">
      <button onclick="sendMessage()" class="btn">Kirim</button>
    </div>

    <button onclick="closeChatbot()" class="btn">Tutup</button>
  </div>
</div>

<script src="js/main.js"></script>

</body>
</html>
