<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Guide</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/pages.css">

</head>

<body>

<div class="bg"></div>

<main class="app">

  <section class="card">

    <section id="homePage" class="page active">

      <div class="hero">
        <div class="hero-img"></div>
      </div>

      <h1>Start Your Career</h1>
      <p class="sub">Ikuti langkah berikut untuk melamar kerja</p>

      <a href="https://alfakarir.alfamart.co.id/register" target="_blank" class="btn primary">
        🚀 Step 1: Register Account
      </a>

      <a href="https://alfakarir.alfamart.co.id/vacancy" target="_blank" class="btn">
        📄 Step 2: Apply Job
      </a>

      <div class="separator"></div>

      <div class="social">
        <button class="btn" id="faqBtn">❓ FAQ</button>
        <a href="https://www.tiktok.com" target="_blank">TikTok</a>
      </div>

    </section>

    <section id="faqPage" class="page">

      <div class="faq-header">
        <button id="backBtn">← Back</button>
        <h2>FAQ</h2>
      </div>

      <div class="faq-content">
        <div class="faq-item">
          <h3>Bagaimana cara daftar?</h3>
          <p>Klik tombol register lalu isi data lengkap.</p>
        </div>

        <div class="faq-item">
          <h3>Apakah gratis?</h3>
          <p>Ya, seluruh proses rekrutmen tidak dipungut biaya.</p>
        </div>
      </div>

    </section>

    <div class="footer">
      <div>Powered by <strong>REC CLS 2</strong></div>
    </div>

  </section>

</main>

<script src="js/navigation.js"></script>
<script src="js/main.js"></script>

</html>
