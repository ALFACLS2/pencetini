<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Guide</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
</head>

<body>

<div class="bg"></div>

<main class="app">
  <section class="card">

    <!-- HERO -->
    <div class="hero">
      <div class="hero-overlay"></div>

      <div class="hero-content">
        <div class="hero-text">
          <h2>Your Career,<br>One Step <span>Ahead</span></h2>
        </div>

        <div class="hero-img"></div>
      </div>
    </div>

    <!-- TITLE -->
    <div class="title">
      <h1>Start Your Career</h1>
      <p>Ikuti langkah berikut untuk melamar kerja</p>
    </div>

    <!-- STEP -->
    <a href="#" class="btn primary">
      🚀 Step 1: Register Account
    </a>

    <a href="#" class="btn ghost">
      📄 Step 2: Apply Job
    </a>

    <!-- MENU -->
    <div class="grid">
      <a href="faq.html" class="btn small">❓ FAQ</a>
      <button onclick="openChatbot()" class="btn small">💬 Chatbot</button>
      <a href="#" class="btn small">🧭 Alur</a>
      <a href="#" class="btn small">💬 Kata Mereka</a>
    </div>

    <div class="separator"></div>

    <div class="grid">
      <a href="#" class="btn small">🎵 TikTok</a>
      <a href="#" class="btn small">📸 Instagram</a>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <p>Powered by <strong>REC CLS 2</strong></p>
      <p>The Creator</p>
      <p>404._.anggoro</p>
    </div>

  </section>
</main>

<!-- CHATBOT -->
<div id="chatbot" class="chatbot">
  <div class="chatbox">
    <div id="chat-window"></div>

    <div class="chat-input">
      <input id="chat-input" placeholder="Tanya di sini...">
      <button onclick="sendMessage()" class="btn small">Kirim</button>
    </div>

    <button onclick="closeChatbot()" class="btn small">Tutup</button>
  </div>
</div>

<script src="js/main.js"></script>

</body>
</html>
