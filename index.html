<!-- CHATBOT -->
<div id="chatbot" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:999;">
  <div style="position:absolute; bottom:0; width:100%; max-width:420px; left:50%; transform:translateX(-50%);
              background:#1e1e1e; border-radius:20px 20px 0 0; padding:15px;">

    <div id="chat-window" style="height:300px; overflow-y:auto; margin-bottom:10px;"></div>

    <div style="display:flex; gap:10px;">
      <input id="chat-input" placeholder="Tanya di sini..." style="flex:1; padding:10px; border-radius:10px; border:none;">
      <button onclick="sendMessage()" class="btn">Kirim</button>
    </div>

    <button onclick="closeChatbot()" class="btn" style="margin-top:10px;">Tutup</button>
  </div>
</div>

<!-- SCRIPT -->
<script>

const KNOWLEDGE = [
  {
    keywords: ["skck"],
    answer: "Silakan urus SKCK terlebih dahulu sebelum tes."
  },
  {
    keywords: ["npwp"],
    answer: "NPWP bisa dibuat secara online."
  },
  {
    keywords: ["dresscode", "baju"],
    answer: "Gunakan polo hitam dan sepatu bertali."
  }
];

function openChatbot(){
  document.getElementById("chatbot").style.display = "block";
}

function closeChatbot(){
  document.getElementById("chatbot").style.display = "none";
}

function sendMessage(){
  const input = document.getElementById("chat-input");
  const text = input.value.toLowerCase();
  if(!text) return;

  addMessage(text, "user");

  let response = "Maaf, belum ada jawaban.";

  KNOWLEDGE.forEach(item => {
    item.keywords.forEach(k => {
      if(text.includes(k)){
        response = item.answer;
      }
    });
  });

  setTimeout(()=>{
    addMessage(response, "bot");
  }, 300);

  input.value = "";
}

function addMessage(text, type){
  const chat = document.getElementById("chat-window");

  const div = document.createElement("div");
  div.style.marginBottom = "8px";
  div.style.textAlign = type === "user" ? "right" : "left";

  div.innerHTML = `
    <span style="
      display:inline-block;
      padding:8px 12px;
      border-radius:12px;
      background:${type === "user" ? "#ff7a18" : "#333"};
      color:white;
      max-width:70%;
    ">
      ${text}
    </span>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

</script>
