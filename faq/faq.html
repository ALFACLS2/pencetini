<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ</title>

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">

<style>
.faq-wrapper {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.category-card {
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 15px;
  cursor: pointer;
}

.category-card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.category-title {
  padding: 12px;
  font-weight: bold;
}

.faq-card {
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 12px;
}

.q {
  font-weight: bold;
  margin-bottom: 6px;
}

.a {
  font-size: 13px;
  opacity: 0.85;
}
</style>

</head>

<body>

<div class="bg"></div>

<main class="app">
  <section class="card faq-wrapper">

    <h1 id="title">FAQ</h1>
    <p class="sub" id="subtitle">Pilih kategori</p>

    <div id="content"></div>

    <a href="../index.html" class="btn">← Kembali</a>

  </section>
</main>

<script>

window.onload = function(){

  const FAQ_DATA = [
const FAQ_DATA = [
  {
    title: "📄 Administrasi",
    image: "https://picsum.photos/400/200?1",
    items: [
      { q: "CV & surat lamaran harus diprint?", a: "Yes. Semua dokumen wajib hardcopy (diprint) dan dibawa saat tes." },
      { q: "SKCK saya sudah tidak aktif, masih bisa ikut?", a: "Masih bisa ikut tes." },
      { q: "Saya belum punya SKCK?", a: "Wajib punya. Silakan segera diurus." },
      { q: "SKCK masih proses/perpanjangan?", a: "Tetap boleh ikut tes, tapi wajib bawa bukti prosesnya." },
      { q: "Belum punya NPWP / NPWP hilang?", a: "Bisa bikin online, cepat kok." },
      { q: "NPWP digital perlu diprint?", a: "Yes, wajib diprint." },
      { q: "Saya cuma punya SKL, bisa dipakai?", a: "Tidak bisa. Wajib ijazah. Khusus lulusan 2025: SKL masih diperbolehkan." }
    ]
  },
  {
    title: "👔 Dresscode",
    image: "https://picsum.photos/400/200?2",
    items: [
      { q: "Sepatu bebas?", a: "Bebas, tapi WAJIB bertali." },
      { q: "Ga punya polo hitam?", a: "Usahakan pinjam. Kalau tidak, pertimbangkan ikutnya." },
      { q: "Boleh selain hitam?", a: "Tidak. Harus hitam." },
      { q: "Pakai kemeja/kaos hitam?", a: "Tidak. Wajib polo hitam." },
      { q: "Hijab harus segiempat?", a: "Yes, dan diikat di leher." },
      { q: "Rambut/kumis/jenggot?", a: "Dirapikan." }
    ]
  },
  {
    title: "📍 Lokasi",
    image: "https://picsum.photos/400/200?3",
    items: [
      { q: "Tes di mana?", a: "Cek di sini: https://maps.app.goo.gl/v88v2Y9ZXXPijZL1A" },
      { q: "Sudah sampai lokasi?", a: "Ikuti arahan petugas keamanan. Jangan jalan sendiri." }
    ]
  },
  {
    title: "🌐 Sistem & Akun",
    image: "https://picsum.photos/400/200?4",
    items: [
      { q: "NIK sudah terdaftar?", a: "Cek panduan di IG alfakarir.cileungsi2" },
      { q: "Wajib daftar Alfakarir?", a: "Yes. Semua proses lewat sistem." }
    ]
  },
  {
    title: "❌ Ketidakhadiran & Status",
    image: "https://picsum.photos/400/200?5",
    items: [
      { q: "Tidak hadir?", a: "Bisa daftar ulang." }
    ]
  },
  {
    title: "⚠️ Catatan Penting",
    image: "https://picsum.photos/400/200?6",
    items: [
      { q: "Hal yang wajib diperhatikan?", a: "Pastikan NIK tidak dobel, gunakan email aktif, dan jangan bikin akun berulang." },
      { q: "Tips biar aman?", a: "Baca info sampai selesai sebelum bertanya." }
    ]
  }
];

  const content = document.getElementById("content");

  function showCategory(){
    content.innerHTML = "";

    FAQ_DATA.forEach((cat, i) => {
      const div = document.createElement("div");
      div.className = "category-card";
      div.innerHTML = `
        <img src="${cat.image}">
        <div class="category-title">${cat.title}</div>
      `;
      div.onclick = () => showFAQ(i);
      content.appendChild(div);
    });
  }

  function showFAQ(index){
    content.innerHTML = "";

    FAQ_DATA[index].items.forEach(item=>{
      const div = document.createElement("div");
      div.className = "faq-card";
      div.innerHTML = `
        <div class="q">${item.q}</div>
        <div class="a">${item.a}</div>
      `;
      content.appendChild(div);
    });

    const back = document.createElement("button");
    back.className = "btn";
    back.innerText = "⬅ Kembali";
    back.onclick = showCategory;

    content.appendChild(back);
  }

  showCategory();

}

</script>

</body>
</html>
