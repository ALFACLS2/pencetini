<script src="../js/faq-data.js"></script>

<script>

function showCategory(){
  const el = document.getElementById("content");
  el.innerHTML = "";

  FAQ_DATA.forEach((cat, index) => {
    el.innerHTML += `
      <div class="category-card" onclick="showFAQ(${index})">
        <img src="${cat.image}">
        <div class="category-title">${cat.title}</div>
      </div>
    `;
  });
}

function showFAQ(index){
  const el = document.getElementById("content");
  el.innerHTML = "";

  const category = FAQ_DATA[index];

  category.items.forEach(item=>{
    el.innerHTML += `
      <div class="faq-card">
        <img src="${category.image}">
        <div class="faq-body">
          <div class="q">${item.q}</div>
          <div>${item.a}</div>
        </div>
      </div>
    `;
  });

  el.innerHTML += `<button class="btn" onclick="showCategory()">⬅ Back</button>`;
}

showCategory();

</script>
