<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ</title>

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">

<style>
.faq-wrapper {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.category-card {
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 15px;
  cursor: pointer;
}

.category-card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.category-title {
  padding: 12px;
  font-weight: bold;
}

.faq-card {
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 12px;
}

.q {
  font-weight: bold;
  margin-bottom: 6px;
}

.a {
  font-size: 13px;
  opacity: 0.85;
}
</style>

</head>

<body>

<div class="bg"></div>

<main class="app">
  <section class="card faq-wrapper">

    <h1 id="title">FAQ</h1>
    <p class="sub" id="subtitle">Pilih kategori</p>

    <div id="content"></div>

    <a href="../index.html" class="btn">← Kembali</a>

  </section>
</main>

<script>

window.onload = function(){

  const FAQ_DATA = [
    { title:"📄 Administrasi", image:"https://picsum.photos/400/200?1", items:[{q:"Test",a:"Test"}]},
    { title:"👔 Dresscode", image:"https://picsum.photos/400/200?2", items:[{q:"Test",a:"Test"}]},
    { title:"📍 Lokasi", image:"https://picsum.photos/400/200?3", items:[{q:"Test",a:"Test"}]},
    { title:"🌐 Sistem & Akun", image:"https://picsum.photos/400/200?4", items:[{q:"Test",a:"Test"}]},
    { title:"❌ Ketidakhadiran", image:"https://picsum.photos/400/200?5", items:[{q:"Test",a:"Test"}]},
    { title:"⚠️ Catatan Penting", image:"https://picsum.photos/400/200?6", items:[{q:"Test",a:"Test"}]}
  ];

  const content = document.getElementById("content");

  function showCategory(){
    content.innerHTML = "";

    FAQ_DATA.forEach((cat, i) => {
      const div = document.createElement("div");
      div.className = "category-card";
      div.innerHTML = `
        <img src="${cat.image}">
        <div class="category-title">${cat.title}</div>
      `;
      div.onclick = () => showFAQ(i);
      content.appendChild(div);
    });
  }

  function showFAQ(index){
    content.innerHTML = "";

    FAQ_DATA[index].items.forEach(item=>{
      const div = document.createElement("div");
      div.className = "faq-card";
      div.innerHTML = `
        <div class="q">${item.q}</div>
        <div class="a">${item.a}</div>
      `;
      content.appendChild(div);
    });

    const back = document.createElement("button");
    back.className = "btn";
    back.innerText = "⬅ Kembali";
    back.onclick = showCategory;

    content.appendChild(back);
  }

  showCategory();

}

</script>

</body>
</html>
