<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ</title>

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">

<style>
.faq-wrapper {
  max-width: 420px;
  margin: auto;
}

.category-card {
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 15px;
  cursor: pointer;
  transition: 0.2s;
}

.category-card:hover {
  transform: scale(1.02);
}

.category-card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.category-title {
  padding: 12px;
  font-weight: bold;
}

.faq-card {
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 12px;
  transition: 0.2s;
}

.faq-card:hover {
  background: rgba(255,255,255,0.08);
}

.q {
  font-weight: bold;
  margin-bottom: 6px;
}

.a {
  font-size: 13px;
  opacity: 0.85;
}

.fade {
  animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>

</head>

<body>

<div class="bg"></div>

<main class="app" style="align-items:flex-start;">
  <section class="card faq-wrapper">

    <h1 id="title">FAQ</h1>
    <p class="sub" id="subtitle">Pilih kategori</p>

    <div id="content"></div>

    <a href="../index.html" class="btn">← Kembali ke Home</a>

  </section>
</main>

<script>

const FAQ_DATA = [

{
  title: "📄 Administrasi",
  image: "https://res.cloudinary.com/dprt1m1wl/image/upload/v1774710141/tulisan_400_x_200_px_tvpon8.png",
  items: [
    { q: "CV & surat lamaran harus diprint?", a: "Yes. Semua dokumen wajib hardcopy." },
    { q: "SKCK tidak aktif?", a: "Masih bisa ikut tes." },
    { q: "Belum punya SKCK?", a: "Wajib diurus." },
    { q: "NPWP belum ada?", a: "Bisa daftar online." }
  ]
},

{
  title: "👔 Dresscode",
  image: "https://res.cloudinary.com/dprt1m1wl/image/upload/v1774710544/tulisan_400_x_200_px_2_cljmse.png",
  items: [
    { q: "Sepatu?", a: "Wajib bertali." },
    { q: "Polo hitam?", a: "Wajib." },
    { q: "Hijab?", a: "Segiempat, ikat leher." }
  ]
}

];

const content = document.getElementById("content");
const title = document.getElementById("title");
const subtitle = document.getElementById("subtitle");

function showCategory() {
  content.innerHTML = "";
  title.innerText = "FAQ";
  subtitle.innerText = "Pilih kategori";

  FAQ_DATA.forEach((cat, i) => {
    const div = document.createElement("div");
    div.className = "category-card fade";

    div.innerHTML = `
      <img src="${cat.image}?t=${Date.now()}">
      <div class="category-title">${cat.title}</div>
    `;

    div.onclick = () => showFAQ(i);
    content.appendChild(div);
  });
}

function showFAQ(index) {
  content.innerHTML = "";
  title.innerText = FAQ_DATA[index].title;
  subtitle.innerText = "Klik untuk baca";

  FAQ_DATA[index].items.forEach(item => {
    const div = document.createElement("div");
    div.className = "faq-card fade";

    div.innerHTML = `
      <div class="q">${item.q}</div>
      <div class="a">${item.a}</div>
    `;

    content.appendChild(div);
  });

  const back = document.createElement("button");
  back.className = "btn";
  back.innerText = "⬅ Kembali";
  back.onclick = showCategory;

  content.appendChild(back);
}

showCategory();

</script>

</body>
</html>
