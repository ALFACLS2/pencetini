<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ</title>

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">

<style>

/* WRAPPER */
.faq-wrapper {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

/* CATEGORY CARD */
.category-card {
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 15px;
  cursor: pointer;
  transition: 0.25s;
}

.category-card:hover {
  transform: scale(1.02);
}

.category-card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.category-title {
  padding: 12px;
  font-weight: bold;
}

/* DETAIL CARD (NO IMAGE) */
.faq-card {
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 12px;
}

.q {
  font-weight: bold;
  margin-bottom: 6px;
  font-size: 14px;
}

.a {
  font-size: 13px;
  opacity: 0.85;
  line-height: 1.5;
}

</style>

</head>

<body>

<div class="bg"></div>

<main class="app">
  <section class="card faq-wrapper">

    <h1 id="title">FAQ</h1>
    <p class="sub" id="subtitle">Pilih kategori</p>

    <div id="content"></div>

    <a href="../index.html" class="btn">← Kembali</a>

  </section>
</main>

<!-- DATA -->
<script src="../js/faq-data.js"></script>

<script>

/* ================= CATEGORY ================= */

function showCategory(){
  const el = document.getElementById("content");
  el.innerHTML = "";

  document.getElementById("title").innerText = "FAQ";
  document.getElementById("subtitle").innerText = "Pilih kategori";

  FAQ_DATA.forEach((cat, index) => {
    el.innerHTML += `
      <div class="category-card" onclick="showFAQ(${index})">
        <img src="${cat.image}">
        <div class="category-title">${cat.title}</div>
      </div>
    `;
  });
}

/* ================= DETAIL ================= */

function showFAQ(index){
  const el = document.getElementById("content");
  el.innerHTML = "";

  const category = FAQ_DATA[index];

  document.getElementById("title").innerText = category.title;
  document.getElementById("subtitle").innerText = "Klik untuk membaca";

  category.items.forEach(item=>{
    el.innerHTML += `
      <div class="faq-card">
        <div class="q">${item.q}</div>
        <div class="a">${item.a}</div>
      </div>
    `;
  });

  el.innerHTML += `
    <button class="btn" onclick="showCategory()">⬅ Kembali</button>
  `;
}

/* INIT */
showCategory();

</script>

</body>
</html>
